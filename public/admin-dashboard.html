<!DOCTYPE html>
<html><head><title>Admin Dashboard</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body style="font-family:sans-serif;padding:20px;background:#f5f7fa;">
<h1>📊 Admin Dashboard</h1>
<canvas id="chart" style="max-width:600px;"></canvas>
<script>
const token = localStorage.getItem('fims_token');
fetch('/api/dashboard/stats',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()).then(d=>{
  new Chart(document.getElementById('chart'),{type:'bar',data:{labels:d.stats.map(s=>s.status),datasets:[{label:'Requests',data:d.stats.map(s=>s.c),backgroundColor:'#667eea'}]}});
});
</script>
</body></html>
